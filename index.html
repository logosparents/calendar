<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>童樂暑期日程助手 | Kiddo Summer Planner</title>
    <!-- Tailwind CSS for modern responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Playful rounded Google Fonts -->

    <style>
        body {
            font-family: 'Fredoka', 'Quicksand', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    </style>

    <!-- Script Logic Implementation FIRST so Alpine can access it -->
    <script>
        // Multi-language dictionary data
        const t = {
          zh: {
            title: "童樂暑期日程助手",
            subtitle: "輕鬆安排小學生的精彩暑假！",
            month: "月",
            week: "周",
            day: "日",
            addActivity: "新增活動",

            activityName: "活動名稱",

            location: "地點",
            notes: "備忘/備註",
            category: "類別",
            recurrence: "重複模式",
            repeatUntil: "重複截止日期",
            noRepeat: "不重複",
            weeklyRepeat: "每星期重複",
            sports: "體育運動",

            save: "儲存",

            shareWhatsApp: "分享至 WhatsApp",
            exportCalendar: "匯出日曆 (ICS)",
            importData: "匯入資料 (JSON/ICS)",
            exportData: "備份資料 (JSON)",
            whatsAppTemplate: "🌟 *今日小朋友暑期活動行程* 🌟\n\n",
            whatsAppFooter: "\n辛苦照顧者！❤️",
            noEvents: "今天沒有安排活動，放鬆一下吧！🎒",
            confirmDelete: "確定要刪除這個活動嗎？",
            weekDays: ["日", "一", "二", "三", "四", "五", "六"],
            allCompleted: "太棒了！今天的活動都完成了！🎉",
            langToggle: "English / 繁中",
            required: "必填欄位",
            addSuccess: "活動新增成功！🎒",
            deleteSuccess: "活動已刪除！"
          },
          en: {
            title: "Kiddo Summer Planner",
            subtitle: "Easily arrange a wonderful summer for your kids!",
            month: "Month",
            week: "Week",
            day: "Day",
            addActivity: "Add Activity",
            editActivity: "Edit Activity",
            activityName: "Activity Name",
            date: "Date",
            time: "Time",
            location: "Location",
            notes: "Notes/Remarks",
            category: "Category",
            recurrence: "Repeat",
            repeatUntil: "Repeat Until",
            noRepeat: "No Repeat",
            weeklyRepeat: "Every Week",
            sports: "Sports",
            art: "Art & Music",
            academic: "Academic",
            leisure: "Leisure/Play",
            other: "Others",
            save: "Save",
            cancel: "Cancel",
            completed: "Completed",
            pending: "Pending",
            shareWhatsApp: "Share to WhatsApp",
            exportCalendar: "Export Calendar (ICS)",
            importData: "Import Data (JSON/ICS)",
            exportData: "Backup Data (JSON)",
            whatsAppTemplate: "🌟 *Today's Kid's Summer Activities* 🌟\n\n",
            whatsAppFooter: "\nThank you for taking care! ❤️",
            noEvents: "No activities today. Let's have some fun! 🎒",
            confirmDelete: "Are you sure you want to delete this activity?",
            weekDays: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
            allCompleted: "Awesome! All activities for today are completed! 🎉",
            langToggle: "English / 繁中",
            required: "Required fields",
            addSuccess: "Activity added successfully! 🎒",
            deleteSuccess: "Activity deleted!"
          }
        };

        // UI categories definitions
        const CATEGORIES = {
          sports: { icon: 'fa-solid fa-basketball-ball text-orange-500', color: 'bg-orange-100 text-orange-600 border-orange-200', dot: 'bg-orange-500' },
          art: { icon: 'fa-solid fa-palette text-pink-500', color: 'bg-pink-100 text-pink-600 border-pink-200', dot: 'bg-pink-500' },
          academic: { icon: 'fa-solid fa-book text-blue-500', color: 'bg-blue-100 text-blue-600 border-blue-200', dot: 'bg-blue-500' },
          leisure: { icon: 'fa-solid fa-face-grin-tears text-green-500', color: 'bg-green-100 text-green-600 border-green-200', dot: 'bg-green-500' },
          other: { icon: 'fa-solid fa-wand-magic-sparkles text-purple-500', color: 'bg-purple-100 text-purple-600 border-purple-200', dot: 'bg-purple-500' },
        };

        function plannerApp() {
            return {
                lang: 'zh',
                viewMode: 'month',
                currentDate: new Date(),
                events: [],
                completedInstances: [],
                kidName: '',
                isModalOpen: false,
                selectedEvent: null,
                toastMessage: '',
                translatingField: '', // Track which field is translating
                t: t,
                CATEGORIES: CATEGORIES,
                
                eventForm: {
                    title_zh: '',
                    title_en: '',
                    date: '',
                    startTime: '09:00',
                    endTime: '10:00',
                    location_zh: '',
                    location_en: '',
                    notes_zh: '',
                    notes_en: '',
                    category: 'sports',
                    recurrence: 'none',
                    repeatUntil: ''
                },

                init() {
                    // Load localstorage parameters
                    const savedEvents = localStorage.getItem('kiddo_events');
                    const savedCompleted = localStorage.getItem('kiddo_completed');
                    const savedLang = localStorage.getItem('kiddo_lang');
                    const savedKidName = localStorage.getItem('kiddo_kid_name');

                    if (savedCompleted) this.completedInstances = JSON.parse(savedCompleted);
                    if (savedLang) this.lang = savedLang;
                    if (savedKidName) this.kidName = savedKidName;

                    if (savedEvents) {
                        let parsedEvents = JSON.parse(savedEvents);
                        // Upgrade data schema: Migrate single title/location/notes to bilingual format
                        this.events = parsedEvents.map(evt => {
                            if (evt.title && evt.title_zh === undefined) {
                                const isChinese = /[\u4e00-\u9fa5]/.test(evt.title);
                                return {
                                    ...evt,
                                    title_zh: isChinese ? evt.title : '',
                                    title_en: isChinese ? '' : evt.title,
                                    location_zh: isChinese ? (evt.location || '') : '',
                                    location_en: isChinese ? '' : (evt.location || ''),
                                    notes_zh: isChinese ? (evt.notes || '') : '',
                                    notes_en: isChinese ? '' : (evt.notes || '')
                                };
                            }
                            return evt;
                        });
                    }
                },

                showToast(msg) {
                    this.toastMessage = msg;
                    setTimeout(() => {
                        this.toastMessage = '';
                    }, 3500);
                },

                toggleLanguage() {
                    this.lang = this.lang === 'zh' ? 'en' : 'zh';
                    localStorage.setItem('kiddo_lang', this.lang);
                },

                saveKidName() {
                    localStorage.setItem('kiddo_kid_name', this.kidName);
                },

                getCategoryConfig(cat) {
                    return CATEGORIES[cat] || CATEGORIES.other;
                },

                getDaysInMonth(year, month) {
                    return new Date(year, month + 1, 0).getDate();
                },

                getFirstDayOfMonth(year, month) {
                    return new Date(year, month, 1).getDay();
                },

                getFirstDayPadding() {
                    const count = this.getFirstDayOfMonth(this.currentDate.getFullYear(), this.currentDate.getMonth());
                    return Array.from({ length: count });
                },

                getDaysArray() {
                    const count = this.getDaysInMonth(this.currentDate.getFullYear(), this.currentDate.getMonth());
                    return Array.from({ length: count }, (_, i) => i + 1);
                },

                formatDateString(date) {
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, '0');
                    const d = String(date.getDate()).padStart(2, '0');
                    return `${y}-${m}-${d}`;
                },

                formatDateShort(date) {
                    return `${date.getMonth() + 1}/${date.getDate()}`;
                },

                getDateStrForDay(dayNum) {
                    const d = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), dayNum);
                    return this.formatDateString(d);
                },

                isToday(date) {
                    return this.formatDateString(new Date()) === this.formatDateString(date);
                },

                getCalendarTitle() {
                    if (this.viewMode === 'month') {
                        return this.lang === 'zh' 
                            ? `${this.currentDate.getFullYear()}年 ${this.currentDate.getMonth() + 1}月` 
                            : this.currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    } else if (this.viewMode === 'week') {
                        return this.lang === 'zh'
                            ? `${this.currentDate.getMonth() + 1}月第 ${Math.ceil(this.currentDate.getDate() / 7)}周`
                            : `Week of ${this.currentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
                    } else {
                        return this.lang === 'zh'
                            ? `${this.currentDate.getMonth() + 1}月${this.currentDate.getDate()}日 (${this.t[this.lang].weekDays[this.currentDate.getDay()]})`
                            : this.currentDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    }
                },

                handlePrev() {
                    if (this.viewMode === 'month') {
                        this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() - 1, 1);
                    } else if (this.viewMode === 'week') {
                        let tempDate = new Date(this.currentDate);
                        tempDate.setDate(tempDate.getDate() - 7);
                        this.currentDate = tempDate;
                    } else {
                        let tempDate = new Date(this.currentDate);
                        tempDate.setDate(tempDate.getDate() - 1);
                        this.currentDate = tempDate;
                    }
                },

                handleNext() {
                    if (this.viewMode === 'month') {
                        this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 1);
                    } else if (this.viewMode === 'week') {
                        let tempDate = new Date(this.currentDate);
                        tempDate.setDate(tempDate.getDate() + 7);
                        this.currentDate = tempDate;
                    } else {
                        let tempDate = new Date(this.currentDate);
                        tempDate.setDate(tempDate.getDate() + 1);
                        this.currentDate = tempDate;
                    }
                },

                handleToday() {
                    this.currentDate = new Date();
                },

                selectAndGoToDay(dayNum) {
                    this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), dayNum);
                    this.viewMode = 'day';
                },

                getDayClass(dayNum) {
                    const dStr = this.getDateStrForDay(dayNum);
                    const isToday = this.formatDateString(new Date()) === dStr;
                    const isSelected = this.formatDateString(this.currentDate) === dStr;
                    
                    if (isToday) return 'bg-yellow-100 border-yellow-400 font-extrabold text-yellow-800';
                    if (isSelected) return 'bg-amber-200 border-amber-400 font-extrabold text-amber-950';
                    return 'bg-white border-slate-100 hover:bg-slate-50 text-slate-700';
                },

                getWeekDates() {
                    const current = new Date(this.currentDate);
                    const day = current.getDay();
                    const diff = current.getDate() - day; // Adjusts to Sunday
                    const weekStart = new Date(current.setDate(diff));
                    
                    return Array.from({ length: 7 }).map((_, i) => {
                        const d = new Date(weekStart);
                        d.setDate(weekStart.getDate() + i);
                        return d;
                    });
                },

                getEventsForDateString(dateStr) {
                    const targetDate = new Date(dateStr);
                    return this.events.filter(event => {
                        // Check exact direct match
                        if (event.date === dateStr) return true;

                        // Check weekly repetition match
                        if (event.recurrence === 'weekly') {
                            const eventStartDate = new Date(event.date);
                            if (targetDate >= eventStartDate) {
                                // Match same day of week
                                if (targetDate.getDay() === eventStartDate.getDay()) {
                                    // Limit by repeatUntil
                                    if (!event.repeatUntil || targetDate <= new Date(event.repeatUntil)) {
                                        return true;
                                    }
                                }
                            }
                        }
                        return false;
                    }).sort((a, b) => a.startTime.localeCompare(b.startTime));
                },

                getEventText(evt, field) {
                    // Smart display fallback if one language is missing
                    if (this.lang === 'zh') {
                        return evt[`${field}_zh`] || evt[`${field}_en`] || '';
                    } else {
                        return evt[`${field}_en`] || evt[`${field}_zh`] || '';
                    }
                },

                isEventCompleted(eventId, dateStr) {
                    return this.completedInstances.includes(`${eventId}_${dateStr}`);
                },

                toggleEventComplete(eventId, dateStr) {
                    const key = `${eventId}_${dateStr}`;
                    if (this.completedInstances.includes(key)) {
                        this.completedInstances = this.completedInstances.filter(item => item !== key);
                    } else {
                        this.completedInstances.push(key);
                    }
                    this.saveState();
                },

                saveState() {
                    localStorage.setItem('kiddo_events', JSON.stringify(this.events));
                    localStorage.setItem('kiddo_completed', JSON.stringify(this.completedInstances));
                },

                resetForm(customDate) {
                    this.selectedEvent = null;
                    this.eventForm = {
                        title_zh: '',
                        title_en: '',
                        date: customDate || this.formatDateString(this.currentDate),
                        startTime: '09:00',
                        endTime: '10:00',
                        location_zh: '',
                        location_en: '',
                        notes_zh: '',
                        notes_en: '',
                        category: 'sports',
                        recurrence: 'none',
                        repeatUntil: ''
                    };
                },

                openAddModal(dateStr) {
                    this.resetForm(dateStr);
                    this.isModalOpen = true;
                },

                openEditModal(event) {
                    this.selectedEvent = event;
                    this.eventForm = {
                        title_zh: event.title_zh || '',
                        title_en: event.title_en || '',
                        date: event.date,
                        startTime: event.startTime,
                        endTime: event.endTime,
                        location_zh: event.location_zh || '',
                        location_en: event.location_en || '',
                        notes_zh: event.notes_zh || '',
                        notes_en: event.notes_en || '',
                        category: event.category || 'sports',
                        recurrence: event.recurrence || 'none',
                        repeatUntil: event.repeatUntil || ''
                    };
                    this.isModalOpen = true;
                },

                // Upgraded Translation Engine using Google Translate Free API Client (CORS-friendly, extremely robust)
                async autoTranslate(field) {
                    const currentFieldLang = this.lang === 'zh' ? 'zh' : 'en';
                    const targetFieldLang = this.lang === 'zh' ? 'en' : 'zh';
                    
                    const sourceText = this.eventForm[`${field}_${currentFieldLang}`]?.trim();
                    if (!sourceText) {
                        this.showToast(this.lang === 'zh' ? '請先填寫當前語言欄位！' : 'Please fill in current language field first!');
                        return;
                    }

                    this.translatingField = field;
                    
                    // Maps standard languages for Google Translate client API
                    const sl = this.lang === 'zh' ? 'zh-TW' : 'en';
                    const tl = this.lang === 'zh' ? 'en' : 'zh-TW';
                    
                    try {
                        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(sourceText)}`;
                        const res = await fetch(url);
                        if (!res.ok) throw new Error('API request failed');
                        
                        const data = await res.json();
                        if (data && data[0]) {
                            // Map over potential multi-sentence structures and merge them
                            const translatedText = data[0].map(sentence => sentence[0]).join('');
                            if (translatedText) {
                                this.eventForm[`${field}_${targetFieldLang}`] = translatedText;
                                this.showToast(this.lang === 'zh' ? '翻譯完成！✨' : 'Translated successfully! ✨');
                            } else {
                                throw new Error('Empty result');
                            }
                        } else {
                            throw new Error('Invalid structure');
                        }
                    } catch (err) {
                        console.error("Translation Error: ", err);
                        this.showToast(this.lang === 'zh' ? '翻譯系統忙碌，請手動填寫！' : 'Translation failed, please type manually!');
                    } finally {
                        this.translatingField = '';
                    }
                },

                handleSubmitEvent() {
                    const titleText = this.lang === 'zh' ? this.eventForm.title_zh : this.eventForm.title_en;
                    if (!titleText || !this.eventForm.date) {
                        this.showToast(this.t[this.lang].required);
                        return;
                    }

                    // Smart Fallback if only one language title is filled
                    if (!this.eventForm.title_zh) this.eventForm.title_zh = this.eventForm.title_en;
                    if (!this.eventForm.title_en) this.eventForm.title_en = this.eventForm.title_zh;
                    if (!this.eventForm.location_zh) this.eventForm.location_zh = this.eventForm.location_en;
                    if (!this.eventForm.location_en) this.eventForm.location_en = this.eventForm.location_zh;
                    if (!this.eventForm.notes_zh) this.eventForm.notes_zh = this.eventForm.notes_en;
                    if (!this.eventForm.notes_en) this.eventForm.notes_en = this.eventForm.notes_zh;

                    if (this.selectedEvent) {
                        // Edit item
                        this.events = this.events.map(evt => evt.id === this.selectedEvent.id ? { ...this.eventForm, id: this.selectedEvent.id } : evt);
                        this.showToast(this.lang === 'zh' ? '活動已更新！✨' : 'Activity updated! ✨');
                    } else {
                        // Create item
                        const newEvent = {
                            ...this.eventForm,
                            id: crypto.randomUUID()
                        };
                        this.events.push(newEvent);
                        this.showToast(this.t[this.lang].addSuccess);
                    }

                    this.saveState();
                    this.isModalOpen = false;
                    this.resetForm();
                },

                handleDeleteEvent(eventId) {
                    if (confirm(this.t[this.lang].confirmDelete)) {
                        this.events = this.events.filter(evt => evt.id !== eventId);
                        this.completedInstances = this.completedInstances.filter(key => !key.startsWith(eventId + '_'));
                        this.saveState();
                        this.isModalOpen = false;
                        this.resetForm();
                        this.showToast(this.t[this.lang].deleteSuccess);
                    }
                },

                shareToWhatsApp() {
                    const dateStr = this.formatDateString(this.currentDate);
                    const dayEvents = this.getEventsForDateString(dateStr);
                    
                    if (dayEvents.length === 0) {
                        this.showToast(this.t[this.lang].noEvents);
                        return;
                    }

                    let text = this.t[this.lang].whatsAppTemplate;
                    const kidDisplay = this.kidName ? `(${this.kidName})` : '';
                    text += `📅 *${dateStr} (${this.t[this.lang].weekDays[this.currentDate.getDay()]})* ${kidDisplay}\n`;
                    text += `━━━━━━━━━━━━━━━━━━━\n`;

                    dayEvents.forEach((evt, idx) => {
                        const isDone = this.isEventCompleted(evt.id, dateStr);
                        const displayTitle = this.getEventText(evt, 'title');
                        const displayLoc = this.getEventText(evt, 'location');
                        const displayNotes = this.getEventText(evt, 'notes');

                        text += `${idx + 1}. ${isDone ? '✅ [Done] ' : '⏰ '}*${evt.startTime} - ${evt.endTime}*\n`;
                        text += `   🎈 *${displayTitle}*\n`;
                        if (displayLoc) text += `   📍 ${displayLoc}\n`;
                        if (displayNotes) text += `   📝 ${displayNotes}\n`;
                        text += `\n`;
                    });

                    text += this.t[this.lang].whatsAppFooter;

                    const encodedText = encodeURIComponent(text);
                    const url = `https://api.whatsapp.com/send?text=${encodedText}`;
                    window.open(url, '_blank');
                },

                exportToICS() {
                    if (this.events.length === 0) {
                        this.showToast(this.lang === 'zh' ? '沒有可匯出的活動！' : 'No events to export!');
                        return;
                    }

                    let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//KiddoSummerPlanner//CN\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";

                    this.events.forEach(evt => {
                        const startDateTime = evt.date.replace(/-/g, '') + 'T' + evt.startTime.replace(':', '') + '00';
                        const endDateTime = evt.date.replace(/-/g, '') + 'T' + evt.endTime.replace(':', '') + '00';
                        
                        // Select localized summary/details for ICS format
                        const displayTitle = this.getEventText(evt, 'title');
                        const displayLoc = this.getEventText(evt, 'location');
                        const displayNotes = this.getEventText(evt, 'notes');

                        icsContent += "BEGIN:VEVENT\n";
                        icsContent += `UID:${evt.id}@kiddosummerplanner\n`;
                        icsContent += `DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\n`;
                        icsContent += `DTSTART:${startDateTime}\n`;
                        icsContent += `DTEND:${endDateTime}\n`;
                        icsContent += `SUMMARY:${displayTitle}\n`;
                        if (displayLoc) icsContent += `LOCATION:${displayLoc}\n`;
                        if (displayNotes) icsContent += `DESCRIPTION:${displayNotes}\n`;

                        if (evt.recurrence === 'weekly') {
                            let rule = "RRULE:FREQ=WEEKLY";
                            if (evt.repeatUntil) {
                                const untilStr = evt.repeatUntil.replace(/-/g, '') + 'T235959Z';
                                rule += `;UNTIL=${untilStr}`;
                            }
                            icsContent += rule + "\n";
                        }

                        icsContent += "END:VEVENT\n";
                    });

                    icsContent += "END:VCALENDAR";

                    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'summer_activities.ics';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    this.showToast(this.lang === 'zh' ? 'ICS 檔案匯出成功！🎒' : 'ICS file exported successfully! 🎒');
                },

                handleJSONExport() {
                    const data = JSON.stringify({ events: this.events, completedInstances: this.completedInstances });
                    const blob = new Blob([data], { type: 'application/json' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `kiddo_planner_backup_${this.formatDateString(new Date())}.json`;
                    link.click();
                },

                handleFileImport(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    const fileName = file.name.toLowerCase();
                    const reader = new FileReader();

                    reader.onload = (event) => {
                        const fileContent = event.target.result;
                        if (fileName.endsWith('.ics')) {
                            this.importFromICS(fileContent);
                        } else if (fileName.endsWith('.json')) {
                            this.importFromJSON(fileContent);
                        } else {
                            this.showToast(this.lang === 'zh' ? '不支援此檔案格式！請使用 .json 或 .ics 檔案' : 'Unsupported format! Use .json or .ics file');
                        }
                    };
                    reader.readAsText(file);
                    e.target.value = '';
                },

                importFromJSON(jsonText) {
                    try {
                        const parsed = JSON.parse(jsonText);
                        if (parsed.events) {
                            const existingIds = new Set(this.events.map(e => e.id));
                            const newEvents = parsed.events.filter(e => !existingIds.has(e.id)).map(evt => {
                                // Double check bilingual compatibility for imported JSON
                                if (evt.title && evt.title_zh === undefined) {
                                    const isChinese = /[\u4e00-\u9fa5]/.test(evt.title);
                                    return {
                                        ...evt,
                                        title_zh: isChinese ? evt.title : '',
                                        title_en: isChinese ? '' : evt.title,
                                        location_zh: isChinese ? (evt.location || '') : '',
                                        location_en: isChinese ? '' : (evt.location || ''),
                                        notes_zh: isChinese ? (evt.notes || '') : '',
                                        notes_en: isChinese ? '' : (evt.notes || '')
                                    };
                                }
                                return evt;
                            });
                            
                            this.events = [...this.events, ...newEvents];
                            this.completedInstances = Array.from(new Set([...this.completedInstances, ...(parsed.completedInstances || [])]));
                            
                            this.saveState();
                            this.showToast(this.lang === 'zh' ? `成功匯入備份資料！新增了 ${newEvents.length} 個行程 ✨` : `Data imported! Added ${newEvents.length} activities ✨`);
                        } else {
                            this.showToast(this.lang === 'zh' ? '無效的 JSON 檔案內容！' : 'Invalid JSON file contents!');
                        }
                    } catch (err) {
                        this.showToast(this.lang === 'zh' ? 'JSON 解析錯誤！' : 'JSON Parse Error!');
                    }
                },

                importFromICS(icsText) {
                    try {
                        const importedEvents = [];
                        const unfoldedText = icsText.replace(/\r?\n[ \t]/g, '');
                        const lines = unfoldedText.split(/\r?\n/);
                        
                        let currentEvent = null;

                        for (let line of lines) {
                            line = line.trim();
                            if (line === 'BEGIN:VEVENT') {
                                currentEvent = {
                                    title_zh: '',
                                    title_en: '',
                                    date: '',
                                    startTime: '09:00',
                                    endTime: '10:00',
                                    location_zh: '',
                                    location_en: '',
                                    notes_zh: '',
                                    notes_en: '',
                                    category: 'other',
                                    recurrence: 'none',
                                    repeatUntil: ''
                                };
                            } else if (line === 'END:VEVENT' && currentEvent) {
                                if ((currentEvent.title_zh || currentEvent.title_en) && currentEvent.date) {
                                    currentEvent.id = crypto.randomUUID();
                                    
                                    // Make sure both languages are set (fallbacks)
                                    if (!currentEvent.title_zh) currentEvent.title_zh = currentEvent.title_en;
                                    if (!currentEvent.title_en) currentEvent.title_en = currentEvent.title_zh;
                                    if (!currentEvent.location_zh) currentEvent.location_zh = currentEvent.location_en;
                                    if (!currentEvent.location_en) currentEvent.location_en = currentEvent.location_zh;
                                    if (!currentEvent.notes_zh) currentEvent.notes_zh = currentEvent.notes_en;
                                    if (!currentEvent.notes_en) currentEvent.notes_en = currentEvent.notes_zh;

                                    // Smart Category Guessing
                                    const titleLower = (currentEvent.title_zh + ' ' + currentEvent.title_en).toLowerCase();
                                    if (/swim|sport|ball|basketball|football|tennis|soccer|run|dance|gym|camp|運動|體育|游泳|球|跑|跳舞|夏令營/.test(titleLower)) {
                                        currentEvent.category = 'sports';
                                    } else if (/art|music|piano|paint|draw|guitar|violin|craft|cello|flute|琴|畫|藝術|音樂|吉他|手工|小提琴/.test(titleLower)) {
                                        currentEvent.category = 'art';
                                    } else if (/math|english|chinese|science|tutor|class|study|exam|course|writing|補習|課|學術|英文|數學|中文|科學|寫作/.test(titleLower)) {
                                        currentEvent.category = 'academic';
                                    } else if (/play|game|fun|park|leisure|movie|disney|zoo|museum|玩|遊戲|公園|娛樂|迪士尼|動物園|博物館/.test(titleLower)) {
                                        currentEvent.category = 'leisure';
                                    }
                                    
                                    importedEvents.push(currentEvent);
                                }
                                currentEvent = null;
                            } else if (currentEvent) {
                                const colonIndex = line.indexOf(':');
                                if (colonIndex !== -1) {
                                    const keyPart = line.substring(0, colonIndex);
                                    let value = line.substring(colonIndex + 1);
                                    value = value.replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\n/g, '\n').replace(/\\/g, '');
                                    const key = keyPart.split(';')[0].toUpperCase();

                                    if (key === 'SUMMARY') {
                                        const isChinese = /[\u4e00-\u9fa5]/.test(value);
                                        if (isChinese) {
                                            currentEvent.title_zh = value;
                                        } else {
                                            currentEvent.title_en = value;
                                        }
                                    } else if (key === 'LOCATION') {
                                        const isChinese = /[\u4e00-\u9fa5]/.test(value);
                                        if (isChinese) {
                                            currentEvent.location_zh = value;
                                        } else {
                                            currentEvent.location_en = value;
                                        }
                                    } else if (key === 'DESCRIPTION') {
                                        const isChinese = /[\u4e00-\u9fa5]/.test(value);
                                        if (isChinese) {
                                            currentEvent.notes_zh = value;
                                        } else {
                                            currentEvent.notes_en = value;
                                        }
                                    } else if (key === 'DTSTART') {
                                        const datePart = value.substring(0, 8);
                                        if (datePart.length === 8) {
                                            currentEvent.date = `${datePart.substring(0, 4)}-${datePart.substring(4, 6)}-${datePart.substring(6, 8)}`;
                                        }
                                        if (value.includes('T') && value.split('T')[1].length >= 4) {
                                            const timePart = value.split('T')[1];
                                            currentEvent.startTime = `${timePart.substring(0, 2)}:${timePart.substring(2, 4)}`;
                                        }
                                    } else if (key === 'DTEND') {
                                        if (value.includes('T') && value.split('T')[1].length >= 4) {
                                            const timePart = value.split('T')[1];
                                            currentEvent.endTime = `${timePart.substring(0, 2)}:${timePart.substring(2, 4)}`;
                                        }
                                    } else if (key === 'RRULE') {
                                        if (value.toUpperCase().includes('FREQ=WEEKLY')) {
                                            currentEvent.recurrence = 'weekly';
                                            const untilMatch = value.match(/UNTIL=([0-9]{8})/i);
                                            if (untilMatch) {
                                                const untilVal = untilMatch[1];
                                                currentEvent.repeatUntil = `${untilVal.substring(0, 4)}-${untilVal.substring(4, 6)}-${untilVal.substring(6, 8)}`;
                                            }
                                        }
                                    }
                                }
                            }
                        }

                        if (importedEvents.length > 0) {
                            this.events = [...this.events, ...importedEvents];
                            this.saveState();
                            this.showToast(this.lang === 'zh' 
                                ? `成功從 Google Calendar 匯入 ${importedEvents.length} 個活動！🎒` 
                                : `Successfully imported ${importedEvents.length} events from Google Calendar! 🎒`
                            );
                        } else {
                            this.showToast(this.lang === 'zh' ? '在 ICS 檔案中找不到有效的活動行程！' : 'No valid events found in the ICS file!');
                        }

                    } catch (err) {
                        this.showToast(this.lang === 'zh' ? '解析 ICS 檔案失敗！' : 'Failed to parse ICS file!');
                    }
                }
            }
        }
    </script>
    
    <!-- Alpine.js is loaded AFTER our scripts are defined -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>

            <p class="text-xs font-black text-amber-900 mb-3 tracking-wider flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-wand-magic-sparkles text-amber-500 animate-pulse"></i>
                <span x-text="lang === 'zh' ? '日曆數據備份與匯出' : 'Backup & Google Calendar'"></span>
            </p>
            
            <div class="grid grid-cols-2 gap-2.5">
                <button @click="exportToICS()"
                        class="bg-amber-100 hover:bg-amber-200 text-amber-950 font-bold py-3 px-3 rounded-xl border border-amber-300 text-xs flex items-center justify-center gap-2 transition active:scale-95">
                    <i class="fa-solid fa-calendar-arrow-down"></i>
                    <span x-text="t[lang].exportCalendar"></span>
                </button>

                <button @click="handleJSONExport()"
                        class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-3 rounded-xl border border-slate-300 text-xs flex items-center justify-center gap-2 transition active:scale-95">
                    <i class="fa-solid fa-file-shield"></i>
                    <span x-text="t[lang].exportData"></span>
                </button>
            </div>

            <div class="mt-3.5 pt-3.5 border-t border-dashed border-slate-200">
                <label class="inline-flex items-center justify-center gap-2 bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold py-2.5 px-4 rounded-xl border border-slate-300 text-xs cursor-pointer transition w-full">
                    <i class="fa-solid fa-file-import"></i>
                    <span x-text="t[lang].importData"></span>
                    <input type="file" accept=".json, .ics" @change="handleFileImport($event)" class="hidden" />
                </label>
            </div>
            
            <div class="mt-4 text-[11px] text-slate-400 font-bold leading-relaxed bg-amber-50 p-3 rounded-xl text-left border border-amber-100">
                💡 <strong x-text="lang === 'zh' ? 'Google Calendar / ICS 說明：' : 'Helper\'s Guide:'"></strong> <br />
                <span x-text="lang === 'zh' ? '1. 【匯出】：按「匯出日曆 (ICS)」下載檔案，可匯入 Google Calendar 設定網頁。' : '1. [Export]: Press \'Export Calendar (ICS)\' to download, then import via Google Calendar web settings.'"></span><br />
                <span x-text="lang === 'zh' ? '2. 【匯入】：直接點擊「匯入資料 (JSON/ICS)」按鈕，選取你從 Google Calendar 匯出的 .ics 檔案，行程將瞬間同步到此網頁！' : '2. [Import]: Directly tap \'Import Data (JSON/ICS)\' and select a .ics file exported from Google Calendar to instantly sync activities!'"></span>
            </div>
        </div>

    </main>

    <!-- Add / Edit Modal Sheet -->
    <div x-show="isModalOpen" 
         class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity"
         style="display: none;">
        
        <div @click.away="isModalOpen = false" 
             class="bg-white rounded-[2rem] border-4 border-amber-300 max-w-md w-full p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            
            <div class="flex justify-between items-center border-b-2 border-dashed border-amber-100 pb-3 mb-4">
                <h3 class="text-xl font-black text-slate-800 flex items-center gap-2">
                    <span>🎪</span>
                    <span x-text="selectedEvent ? t[lang].editActivity : t[lang].addActivity"></span>
                </h3>
                <button @click="isModalOpen = false" class="p-1 rounded-full hover:bg-slate-100 text-slate-400">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <!-- Input Form inside modal -->
            <form @submit.prevent="handleSubmitEvent()" class="space-y-4">
              
              <!-- Quick Category visual selectors -->
              <div>
                <label class="block text-xs font-black text-slate-400 mb-1.5 uppercase tracking-wide" x-text="t[lang].category"></label>
                <div class="grid grid-cols-3 gap-1.5">
                  <template x-for="cat in Object.keys(CATEGORIES)">
                    <button type="button"
                            @click="eventForm.category = cat"
                            :class="eventForm.category === cat ? getCategoryConfig(cat).color + ' border-2 ring-2 ring-amber-300' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'"
                            class="py-2 px-2 rounded-xl border text-[11px] font-black flex flex-col items-center gap-1.5 transition">
                        <i :class="getCategoryConfig(cat).icon" class="text-sm"></i>
                        <span x-text="t[lang][cat]"></span>
                    </button>
                  </template>
                </div>
              </div>

              <!-- Activity Title (Bilingual Field) -->
              <div class="bg-amber-50/50 p-3 rounded-2xl border-2 border-dashed border-amber-200 space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-black text-amber-800">✨ 填寫活動名稱 (Bilingual Fields)</span>
                    <button type="button" @click="autoTranslate('title')"
                            class="text-[10px] bg-amber-400 hover:bg-amber-500 text-slate-900 font-extrabold px-2 py-1 rounded-lg flex items-center gap-1 transition">
                        <i class="fa-solid fa-wand-magic-sparkles animate-spin" x-show="translatingField === 'title'"></i>
                        <i class="fa-solid fa-wand-magic-sparkles" x-show="translatingField !== 'title'"></i>
                        <span x-text="lang === 'zh' ? '一鍵翻譯 ⇄ Auto-Translate' : 'Translate ⇄ 一鍵翻譯'"></span>
                    </button>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-0.5">繁體中文 (ZH) *</label>
                    <input type="text"
                           placeholder="例如：鋼琴班"
                           x-model="eventForm.title_zh"
                           class="w-full p-2 rounded-lg border-2 border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-0.5">English (EN) *</label>
                    <input type="text"
                           placeholder="e.g. Piano Lesson"
                           x-model="eventForm.title_en"
                           class="w-full p-2 rounded-lg border-2 border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-sm" />
                </div>
              </div>

              <!-- Date Selection & Recurrence -->
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-black text-slate-700 mb-1">
                      <span x-text="t[lang].date"></span> *
                  </label>
                  <input type="date"
                         required
                         x-model="eventForm.date"
                         class="w-full p-2.5 rounded-xl border-2 border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-sm" />
                </div>

                <div>
                  <label class="block text-sm font-black text-slate-700 mb-1" x-text="t[lang].recurrence"></label>
                  <select x-model="eventForm.recurrence"
                          class="w-full p-2.5 rounded-xl border-2 border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-sm bg-white">
                    <option value="none" x-text="t[lang].noRepeat"></option>
                    <option value="weekly" x-text="t[lang].weeklyRepeat"></option>
                  </select>
                </div>
              </div>

              <!-- Recurrence Limit -->
              <div x-show="eventForm.recurrence === 'weekly'">
                <label class="block text-sm font-black text-slate-700 mb-1" x-text="t[lang].repeatUntil"></label>
                <input type="date"
                       x-model="eventForm.repeatUntil"
                       class="w-full p-2.5 rounded-xl border-2 border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-sm" />
              </div>

              <!-- Start and End Times -->
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-black text-slate-700 mb-1">
                      開始時間 / Start
                  </label>
                  <input type="time"
                         x-model="eventForm.startTime"
                         class="w-full p-2.5 rounded-xl border-2 border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-sm" />
                </div>

                <div>
                  <label class="block text-sm font-black text-slate-700 mb-1">
                      結束時間 / End
                  </label>
                  <input type="time"
                         x-model="eventForm.endTime"
                         class="w-full p-2.5 rounded-xl border-2 border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-sm" />
                </div>
              </div>

              <!-- Location Details (Bilingual Field) -->
              <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200 space-y-2">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-black text-slate-600">📍 填寫上課地點 (Location)</span>
                    <button type="button" @click="autoTranslate('location')"
                            class="text-[9px] bg-slate-200 hover:bg-slate-300 text-slate-700 font-black px-2 py-1 rounded flex items-center gap-1 transition">
                        <i class="fa-solid fa-language animate-pulse" x-show="translatingField === 'location'"></i>
                        <i class="fa-solid fa-language" x-show="translatingField !== 'location'"></i>
                        <span>Translate ⇄ 翻譯</span>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="繁中: 柴灣體育館" x-model="eventForm.location_zh"
                           class="p-2 rounded-lg border border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-xs" />
                    <input type="text" placeholder="English: Sports Center" x-model="eventForm.location_en"
                           class="p-2 rounded-lg border border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-xs" />
                </div>
              </div>

              <!-- Notes Info (Bilingual Field) -->
              <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200 space-y-2">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-black text-slate-600">📝 填寫備註 (Notes / Remarks)</span>
                    <button type="button" @click="autoTranslate('notes')"
                            class="text-[9px] bg-slate-200 hover:bg-slate-300 text-slate-700 font-black px-2 py-1 rounded flex items-center gap-1 transition">
                        <i class="fa-solid fa-language animate-pulse" x-show="translatingField === 'notes'"></i>
                        <i class="fa-solid fa-language" x-show="translatingField !== 'notes'"></i>
                        <span>Translate ⇄ 翻譯</span>
                    </button>
                </div>
                <div class="space-y-1.5">
                    <textarea rows="1" placeholder="繁中: 帶泳帽與毛巾" x-model="eventForm.notes_zh"
                              class="w-full p-2 rounded-lg border border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-xs"></textarea>
                    <textarea rows="1" placeholder="English: Bring cap & towel" x-model="eventForm.notes_en"
                              class="w-full p-2 rounded-lg border border-slate-200 focus:border-amber-400 focus:outline-none font-bold text-slate-700 text-xs"></textarea>
                </div>
              </div>

              <!-- Modal Submit Options -->
              <div class="flex gap-2.5 pt-3">
                <button type="button"
                        x-show="selectedEvent"
                        @click="handleDeleteEvent(selectedEvent.id)"
                        class="bg-red-100 hover:bg-red-200 text-red-600 font-extrabold p-3.5 rounded-xl border border-red-200 flex items-center justify-center shadow-sm transition active:scale-90">
                    <i class="fa-solid fa-trash-can text-lg"></i>
                </button>
                
                <button type="button"
                        @click="isModalOpen = false"
                        class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-extrabold py-3 rounded-xl text-center shadow-sm text-sm"
                        x-text="t[lang].cancel">
                </button>

                <button type="submit"
                        class="flex-1 bg-amber-400 hover:bg-amber-500 text-slate-900 font-extrabold py-3 rounded-xl text-center border-b-4 border-amber-600 active:border-b-0 active:translate-y-1 transition-all shadow-md text-sm"
                        x-text="t[lang].save">
                </button>
              </div>

            </form>
          </div>
    </div>
</body>
</html>
